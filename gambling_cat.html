<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ギャンブル猫</title>
<link href="https://fonts.googleapis.com/css2?family=Zen+Antique+Soft&family=Noto+Serif+JP:wght@400;700;900&display=swap" rel="stylesheet">
<style>
  :root {
    --gold: #d4a017;
    --gold-light: #f0c94a;
    --gold-dark: #8a6500;
    --red: #c0392b;
    --red-bright: #e74c3c;
    --green: #1a6b3a;
    --green-bright: #27ae60;
    --black: #0a0804;
    --paper: #1a1208;
    --ink: #f5e6c8;
    --shadow: rgba(0,0,0,0.8);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background-color: var(--black);
    color: var(--ink);
    font-family: 'Noto Serif JP', serif;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    position: relative;
  }

  /* 背景テクスチャ */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background:
      radial-gradient(ellipse at 20% 20%, rgba(180, 120, 0, 0.08) 0%, transparent 50%),
      radial-gradient(ellipse at 80% 80%, rgba(150, 30, 10, 0.08) 0%, transparent 50%),
      repeating-linear-gradient(
        45deg,
        transparent,
        transparent 2px,
        rgba(212, 160, 23, 0.015) 2px,
        rgba(212, 160, 23, 0.015) 4px
      );
    pointer-events: none;
    z-index: 0;
  }

  /* 隅の装飾 */
  body::after {
    content: '♠ ♥ ♦ ♣';
    position: fixed;
    top: 16px;
    right: 20px;
    font-size: 14px;
    color: rgba(212, 160, 23, 0.2);
    letter-spacing: 6px;
    z-index: 0;
  }

  .corner-deco {
    position: fixed;
    font-size: 13px;
    color: rgba(212, 160, 23, 0.2);
    letter-spacing: 6px;
    z-index: 0;
  }
  .corner-deco.bl { bottom: 16px; left: 20px; }
  .corner-deco.tl { top: 16px; left: 20px; }
  .corner-deco.br { bottom: 16px; right: 20px; }

  .container {
    position: relative;
    z-index: 1;
    width: 100%;
    max-width: 480px;
    padding: 20px;
  }

  /* ===== SCREEN ===== */
  .screen {
    display: none;
    flex-direction: column;
    align-items: center;
    text-align: center;
    animation: fadeIn 0.6s ease;
  }
  .screen.active { display: flex; }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(12px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  /* ===== TITLE SCREEN ===== */
  .title-border {
    border: 2px solid var(--gold-dark);
    border-radius: 4px;
    padding: 36px 40px 40px;
    width: 100%;
    position: relative;
    background: linear-gradient(160deg, rgba(30,20,5,0.95), rgba(15,10,3,0.95));
    box-shadow:
      0 0 40px rgba(212,160,23,0.12),
      inset 0 0 60px rgba(0,0,0,0.5);
  }

  .title-border::before,
  .title-border::after {
    content: '◈';
    position: absolute;
    color: var(--gold-dark);
    font-size: 18px;
  }
  .title-border::before { top: -12px; left: 50%; transform: translateX(-50%); }
  .title-border::after  { bottom: -12px; left: 50%; transform: translateX(-50%); }

  .cat-display {
    font-size: 80px;
    line-height: 1;
    margin-bottom: 12px;
    filter: drop-shadow(0 0 16px rgba(212,160,23,0.5));
    animation: float 3s ease-in-out infinite;
  }

  @keyframes float {
    0%, 100% { transform: translateY(0); }
    50%       { transform: translateY(-8px); }
  }

  .title-main {
    font-family: 'Zen Antique Soft', serif;
    font-size: 42px;
    font-weight: 900;
    letter-spacing: 0.15em;
    background: linear-gradient(180deg, #f5d06a 0%, #d4a017 40%, #8a6500 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    text-shadow: none;
    margin-bottom: 4px;
  }

  .title-sub {
    font-size: 11px;
    letter-spacing: 0.4em;
    color: var(--gold-dark);
    margin-bottom: 30px;
    text-transform: uppercase;
  }

  .intro-text {
    font-size: 15px;
    line-height: 2;
    color: #e8d5a8;
    background: rgba(212,160,23,0.04);
    border: 1px solid rgba(212,160,23,0.15);
    border-radius: 3px;
    padding: 18px 20px;
    margin-bottom: 32px;
  }

  /* ===== BUTTONS ===== */
  .btn {
    display: inline-block;
    cursor: pointer;
    border: none;
    outline: none;
    font-family: 'Noto Serif JP', serif;
    transition: all 0.15s ease;
  }

  .btn-primary {
    background: linear-gradient(160deg, #f0c94a, #c8900a, #8a6500);
    color: #0a0804;
    font-size: 22px;
    font-weight: 900;
    letter-spacing: 0.3em;
    padding: 16px 56px;
    border-radius: 3px;
    position: relative;
    box-shadow:
      0 4px 20px rgba(212,160,23,0.3),
      inset 0 1px 0 rgba(255,255,255,0.2);
  }
  .btn-primary::before {
    content: '◆';
    margin-right: 8px;
    font-size: 14px;
  }
  .btn-primary::after {
    content: '◆';
    margin-left: 8px;
    font-size: 14px;
  }
  .btn-primary:hover {
    transform: translateY(-2px);
    box-shadow: 0 8px 28px rgba(212,160,23,0.45), inset 0 1px 0 rgba(255,255,255,0.25);
    filter: brightness(1.1);
  }
  .btn-primary:active { transform: translateY(1px); }

  .btn-gamble {
    background: linear-gradient(160deg, #ff6b4a, #c0392b, #7a1a10);
    color: #fff8f0;
    font-size: 28px;
    font-weight: 900;
    letter-spacing: 0.35em;
    padding: 22px 64px;
    border-radius: 4px;
    box-shadow:
      0 6px 30px rgba(192,57,43,0.4),
      inset 0 1px 0 rgba(255,200,180,0.3);
    position: relative;
    overflow: hidden;
  }
  .btn-gamble::before {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(90deg, transparent, rgba(255,255,255,0.08), transparent);
    transform: translateX(-100%);
    transition: transform 0.4s ease;
  }
  .btn-gamble:hover::before { transform: translateX(100%); }
  .btn-gamble:hover {
    transform: translateY(-3px) scale(1.02);
    box-shadow: 0 12px 40px rgba(192,57,43,0.55), inset 0 1px 0 rgba(255,200,180,0.35);
  }
  .btn-gamble:active { transform: translateY(1px) scale(0.99); }
  .btn-gamble:disabled {
    opacity: 0.5;
    cursor: not-allowed;
    transform: none;
  }

  .btn-secondary {
    background: transparent;
    color: var(--gold);
    font-size: 14px;
    letter-spacing: 0.2em;
    padding: 10px 28px;
    border: 1px solid var(--gold-dark);
    border-radius: 3px;
  }
  .btn-secondary:hover {
    background: rgba(212,160,23,0.08);
    border-color: var(--gold);
  }

  /* ===== GAME SCREEN ===== */
  .coin-display {
    width: 100%;
    background: linear-gradient(160deg, rgba(30,20,5,0.98), rgba(15,10,3,0.98));
    border: 1px solid var(--gold-dark);
    border-radius: 4px;
    padding: 24px 28px;
    margin-bottom: 20px;
    position: relative;
    box-shadow: 0 0 30px rgba(212,160,23,0.08);
  }

  .coin-label {
    font-size: 10px;
    letter-spacing: 0.5em;
    color: var(--gold-dark);
    text-transform: uppercase;
    margin-bottom: 8px;
  }

  .coin-amount {
    font-family: 'Zen Antique Soft', serif;
    font-size: 36px;
    font-weight: 900;
    background: linear-gradient(180deg, #f5d06a, #c8900a);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    line-height: 1.1;
    transition: all 0.3s ease;
  }

  .coin-unit {
    font-size: 13px;
    color: var(--gold-dark);
    letter-spacing: 0.2em;
    margin-top: 2px;
  }

  .progress-section {
    width: 100%;
    margin-bottom: 24px;
  }

  .progress-labels {
    display: flex;
    justify-content: space-between;
    font-size: 10px;
    letter-spacing: 0.3em;
    color: rgba(212,160,23,0.5);
    margin-bottom: 6px;
  }

  .progress-bar {
    height: 6px;
    background: rgba(212,160,23,0.1);
    border-radius: 3px;
    overflow: hidden;
    border: 1px solid rgba(212,160,23,0.2);
  }

  .progress-fill {
    height: 100%;
    background: linear-gradient(90deg, #8a6500, #d4a017, #f0c94a);
    border-radius: 3px;
    transition: width 0.8s cubic-bezier(0.25, 1, 0.5, 1);
    box-shadow: 0 0 8px rgba(212,160,23,0.4);
  }

  /* ===== MESSAGE ===== */
  .message-box {
    width: 100%;
    min-height: 52px;
    display: flex;
    align-items: center;
    justify-content: center;
    border-radius: 3px;
    padding: 12px 16px;
    margin-bottom: 24px;
    font-size: 18px;
    font-weight: 700;
    letter-spacing: 0.1em;
    transition: all 0.3s ease;
    opacity: 0;
  }

  .message-box.show { opacity: 1; }
  .message-box.win  { background: rgba(26,107,58,0.25); border: 1px solid rgba(39,174,96,0.4); color: #6be09a; }
  .message-box.lose { background: rgba(192,57,43,0.2);  border: 1px solid rgba(231,76,60,0.4);  color: #ff8070; }

  /* ===== RESULT SCREENS ===== */
  .result-box {
    width: 100%;
    border-radius: 4px;
    padding: 36px 32px;
    position: relative;
  }

  .result-box.gameover {
    background: linear-gradient(160deg, rgba(40,5,5,0.98), rgba(20,3,3,0.98));
    border: 1px solid rgba(192,57,43,0.4);
    box-shadow: 0 0 40px rgba(192,57,43,0.12);
  }

  .result-box.clear {
    background: linear-gradient(160deg, rgba(5,30,15,0.98), rgba(3,15,8,0.98));
    border: 1px solid rgba(212,160,23,0.5);
    box-shadow: 0 0 60px rgba(212,160,23,0.2);
  }

  .result-emoji { font-size: 64px; margin-bottom: 12px; display: block; }
  .result-title {
    font-family: 'Zen Antique Soft', serif;
    font-size: 32px;
    font-weight: 900;
    letter-spacing: 0.15em;
    margin-bottom: 16px;
  }
  .result-box.gameover .result-title { color: var(--red-bright); }
  .result-box.clear .result-title {
    background: linear-gradient(180deg, #f5d06a, #d4a017);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  .result-desc {
    font-size: 14px;
    line-height: 1.9;
    color: #c8b090;
    margin-bottom: 24px;
  }

  .result-stats {
    display: flex;
    gap: 12px;
    margin-bottom: 28px;
    justify-content: center;
    flex-wrap: wrap;
  }

  .stat-chip {
    background: rgba(212,160,23,0.08);
    border: 1px solid rgba(212,160,23,0.2);
    border-radius: 3px;
    padding: 10px 18px;
    text-align: center;
  }
  .stat-chip .label { font-size: 9px; letter-spacing: 0.4em; color: var(--gold-dark); display: block; margin-bottom: 4px; }
  .stat-chip .value { font-size: 22px; font-weight: 900; color: var(--gold-light); font-family: 'Zen Antique Soft', serif; }

  /* ===== ANIMATIONS ===== */
  @keyframes shake {
    0%,100% { transform: translateX(0); }
    20% { transform: translateX(-8px) rotate(-1deg); }
    40% { transform: translateX(8px) rotate(1deg); }
    60% { transform: translateX(-5px); }
    80% { transform: translateX(5px); }
  }

  @keyframes pulse-gold {
    0%,100% { box-shadow: 0 0 30px rgba(212,160,23,0.08); }
    50%      { box-shadow: 0 0 60px rgba(212,160,23,0.3); }
  }

  @keyframes coins-rain {
    0%   { transform: translateY(-20px) rotate(0deg); opacity: 1; }
    100% { transform: translateY(80px) rotate(360deg); opacity: 0; }
  }

  .shake { animation: shake 0.5s ease; }

  .coin-particle {
    position: fixed;
    font-size: 22px;
    pointer-events: none;
    z-index: 100;
    animation: coins-rain 1s ease forwards;
  }

  /* ===== DECORATIVE DIVIDER ===== */
  .divider {
    display: flex;
    align-items: center;
    gap: 10px;
    width: 100%;
    margin: 6px 0 20px;
  }
  .divider::before, .divider::after {
    content: '';
    flex: 1;
    height: 1px;
    background: linear-gradient(90deg, transparent, rgba(212,160,23,0.3), transparent);
  }
  .divider span { font-size: 12px; color: rgba(212,160,23,0.4); }

  /* ===== LOSS COUNT ===== */
  .loss-tracker {
    position: absolute;
    top: 14px;
    right: 16px;
    font-size: 10px;
    letter-spacing: 0.25em;
    color: rgba(192,57,43,0.5);
  }
</style>
</head>
<body>

<div class="corner-deco tl">♠ ♥ ♦ ♣</div>
<div class="corner-deco bl">♣ ♦ ♥ ♠</div>
<div class="corner-deco br">♠ ♥ ♦ ♣</div>

<div class="container">

  <!-- ========== TITLE SCREEN ========== -->
  <div class="screen active" id="screen-title">
    <div class="title-border">
      <div class="cat-display">🐱</div>
      <div class="title-main">ギャンブル猫</div>
      <div class="title-sub">GAMBLING CAT</div>
      <div class="intro-text">
        世の中はお金です。<br>
        どうです？所持金を2倍か、0か。<br>
        どちらになるか私に任せてみませんか？
      </div>
      <button class="btn btn-primary" onclick="startGame()">は じ め る</button>
    </div>
  </div>

  <!-- ========== GAME SCREEN ========== -->
  <div class="screen" id="screen-game">
    <div class="coin-display" id="coin-display">
      <div class="loss-tracker" id="loss-tracker">全滅: 0回</div>
      <div class="coin-label">所 持 コ イ ン</div>
      <div class="coin-amount" id="coin-amount">100,000,000</div>
      <div class="coin-unit">coin</div>
    </div>

    <div class="progress-section">
      <div class="progress-labels">
        <span>1億</span>
        <span>目標：1兆</span>
      </div>
      <div class="progress-bar">
        <div class="progress-fill" id="progress-fill" style="width:0%"></div>
      </div>
    </div>

    <div class="cat-display">🐱</div>
    <div class="message-box" id="message-box"></div>

    <button class="btn btn-gamble" id="gamble-btn" onclick="doGamble()">任 せ る</button>
  </div>

  <!-- ========== GAME OVER SCREEN ========== -->
  <div class="screen" id="screen-gameover">
    <div class="result-box gameover">
      <span class="result-emoji">💸</span>
      <div class="result-title">ゲームオーバー</div>
      <div class="result-stats">
        <div class="stat-chip">
          <span class="label">MAX到達額</span>
          <span class="value" id="go-max-coin">—</span>
        </div>
        <div class="stat-chip">
          <span class="label">全滅回数</span>
          <span class="value" id="go-loss-count">0</span>
        </div>
      </div>
      <button class="btn btn-primary" onclick="startGame()">も う 一 度</button>
    </div>
  </div>

  <!-- ========== GAME CLEAR SCREEN ========== -->
  <div class="screen" id="screen-clear">
    <div class="result-box clear">
      <span class="result-emoji">👑</span>
      <div class="result-title">ゲームクリア！</div>
      <div class="result-desc" id="clear-desc">
        素晴らしい！あなたは真の勝者です。
      </div>
      <div class="result-stats">
        <div class="stat-chip">
          <span class="label">最終所持額</span>
          <span class="value" id="cl-coin">1兆</span>
        </div>
        <div class="stat-chip">
          <span class="label">全滅回数</span>
          <span class="value" id="cl-loss-count">0</span>
        </div>
      </div>
      <div class="divider"><span>◈</span></div>
      <button class="btn btn-primary" onclick="startGame()">も う 一 度</button>
    </div>
  </div>

</div>

<script>
  const START_COINS   = 100_000_000;       // 1億
  const TARGET_COINS  = 1_000_000_000_000; // 1兆
  const LOG_START     = Math.log2(START_COINS);
  const LOG_TARGET    = Math.log2(TARGET_COINS);

  let coins     = START_COINS;
  let lossCount = 0;       // 今プレイセッション通算の全滅回数
  let maxCoins  = START_COINS;
  let busy      = false;

  function formatCoins(n) {
    if (n >= 1_000_000_000_000) {
      const t = Math.round(n / 1_000_000_000_000);
      return t.toLocaleString('ja-JP') + '兆';
    }
    if (n >= 100_000_000) {
      const oku = Math.round(n / 100_000_000);
      return oku.toLocaleString('ja-JP') + '億';
    }
    return n.toLocaleString('ja-JP');
  }

  function showScreen(id) {
    document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
    document.getElementById(id).classList.add('active');
  }

  function updateUI() {
    document.getElementById('coin-amount').textContent = formatCoins(coins);
    document.getElementById('loss-tracker').textContent = '全滅: ' + lossCount + '回';

    // プログレスバー (log2スケール)
    const logCurrent = Math.log2(Math.max(coins, 1));
    const pct = Math.max(0, Math.min(100,
      ((logCurrent - LOG_START) / (LOG_TARGET - LOG_START)) * 100
    ));
    document.getElementById('progress-fill').style.width = pct + '%';
  }

  function showMessage(text, type) {
    const box = document.getElementById('message-box');
    box.textContent = text;
    box.className = 'message-box show ' + type;
  }

  function hideMessage() {
    const box = document.getElementById('message-box');
    box.className = 'message-box';
  }

  function spawnCoinParticles(x, y) {
    for (let i = 0; i < 10; i++) {
      const el = document.createElement('div');
      el.className = 'coin-particle';
      el.textContent = '🪙';
      el.style.left = (x + (Math.random() - 0.5) * 120) + 'px';
      el.style.top  = (y + (Math.random() - 0.5) * 40) + 'px';
      el.style.animationDelay = (Math.random() * 0.3) + 's';
      document.body.appendChild(el);
      setTimeout(() => el.remove(), 1400);
    }
  }

  function startGame() {
    coins    = START_COINS;
    maxCoins = START_COINS;
    busy     = false;
    hideMessage();
    document.getElementById('gamble-btn').disabled = false;
    updateUI();
    showScreen('screen-game');
  }

  function doGamble() {
    if (busy) return;
    busy = true;
    const btn = document.getElementById('gamble-btn');
    btn.disabled = true;
    hideMessage();

    // サスペンスのための短い遅延
    setTimeout(() => {
      const win = Math.random() < 0.5;

      if (win) {
        coins *= 2;
        coins = Math.min(coins, TARGET_COINS);
        if (coins > maxCoins) maxCoins = coins;

        // コイン演出
        const rect = btn.getBoundingClientRect();
        spawnCoinParticles(rect.left + rect.width / 2, rect.top);

        // コイン表示アニメ
        const coinDisp = document.getElementById('coin-display');
        coinDisp.style.animation = 'pulse-gold 0.6s ease';
        setTimeout(() => coinDisp.style.animation = '', 700);

        updateUI();

        if (coins >= TARGET_COINS) {
          showMessage('増えたぞ！', 'win');
          setTimeout(() => showClear(), 900);
        } else {
          showMessage('増えたぞ', 'win');
          setTimeout(() => { btn.disabled = false; busy = false; }, 700);
        }
      } else {
        // 全滅
        lossCount++;
        coins = 0;
        updateUI();

        const coinDisp = document.getElementById('coin-display');
        coinDisp.classList.add('shake');
        setTimeout(() => coinDisp.classList.remove('shake'), 500);

        showMessage('...？どうかしましたか？', 'lose');
        setTimeout(() => showGameOver(), 1500);
      }
    }, 280);
  }

  function showGameOver() {
    document.getElementById('go-max-coin').textContent   = formatCoins(maxCoins);
    document.getElementById('go-loss-count').textContent = lossCount;
    showScreen('screen-gameover');
  }

  function showClear() {
    document.getElementById('cl-coin').textContent       = formatCoins(coins);
    document.getElementById('cl-loss-count').textContent = lossCount;

    let praise = '';
    if (lossCount === 0) {
      praise = '一度も全滅せずに1兆コインを達成！\n完璧な勝利です。あなたは猫の神です。';
    } else if (lossCount <= 3) {
      praise = `わずか${lossCount}回の全滅で1兆コイン到達！\n不屈の精神を持つ真の勝者です。`;
    } else if (lossCount <= 10) {
      praise = `${lossCount}回の全滅を乗り越え、ついに1兆コイン！\n諦めない心が勝利をもたらしました。`;
    } else {
      praise = `${lossCount}回も全滅しながら立ち上がり続け、\nついに1兆コイン達成！その執念、見事です。`;
    }
    document.getElementById('clear-desc').innerHTML = praise.replace('\n', '<br>');
    showScreen('screen-clear');
  }
</script>
</body>
</html>
